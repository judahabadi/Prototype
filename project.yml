name: Prototype
options:
  bundleIdPrefix: com.prototype.keyboard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Prototype:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: Prototype
    info:
      path: Prototype/Info.plist
    entitlements:
      path: Prototype/Prototype.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prototype.keyboard.app
        PRODUCT_NAME: Prototype
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: PrototypeKeyboard
        embed: true
        codeSign: true

  PrototypeKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: PrototypeKeyboard
        excludes:
          - "Resources/**/*.json"
      - path: PrototypeKeyboard/Resources
        type: folder
        buildPhase: resources
    info:
      path: PrototypeKeyboard/Info.plist
    entitlements:
      path: PrototypeKeyboard/PrototypeKeyboard.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prototype.keyboard.app.extension
        PRODUCT_NAME: PrototypeKeyboard
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        APPLICATION_EXTENSION_API_ONLY: YES
