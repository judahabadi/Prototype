name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ProtoType/ProtoType/ProtoType.xcodeproj \
            -scheme ProtoType

      - name: Build
        run: |
          xcodebuild build \
            -project ProtoType/ProtoType/ProtoType.xcodeproj \
            -scheme ProtoType \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Pick a simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; ids=[dev['udid'] for rt in d for dev in d[rt] if 'iPhone' in dev.get('name','')]; print(ids[0] if ids else '')")
          echo "Using simulator: $DEVICE_ID"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Test (+ bar snapshots)
        run: |
          xcodebuild test \
            -project ProtoType/ProtoType/ProtoType.xcodeproj \
            -scheme ProtoType \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Export bar snapshots
        if: always()
        run: |
          mkdir -p snapshots
          # Xcode 16+ syntax first; fall back to the legacy form.
          xcrun xcresulttool export attachments \
            --path TestResults.xcresult \
            --output-path snapshots 2>/dev/null \
          || xcrun xcresulttool export --type attachments \
            --path TestResults.xcresult --output-path snapshots 2>/dev/null \
          || echo "attachment export failed"
          ls -R snapshots || true

      - name: Upload bar snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bar-snapshots
          path: snapshots
          if-no-files-found: warn
